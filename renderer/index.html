<!DOCTYPE html>
<!-- Reamlet — SPDX-License-Identifier: GPL-3.0-or-later -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- img-src includes data: to allow canvas.toDataURL() thumbnails -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:; script-src 'self' 'unsafe-eval' file:; style-src 'self' 'unsafe-inline'; worker-src blob: file:; img-src 'self' data: file:;" />
  <title>Reamlet</title>
  <link rel="icon" type="image/png" href="../assets/icon.png" />
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <!-- ── Top toolbar: title row + tools row ────────────────────── -->
  <div id="topbar">

    <!-- Row 1: title bar (draggable, File/View left, path center, window controls right) -->
    <div id="titlebar-row">

      <div id="titlebar-section">
        <div class="titlebar-menu">
          <button class="titlebar-menu-btn">File</button>
          <div class="titlebar-dropdown hidden">
            <button data-menu="open">Open… <span>Ctrl+O</span></button>
            <button data-menu="save">Save <span>Ctrl+S</span></button>
            <button data-menu="save-copy">Save Copy… <span>Ctrl+⇧+S</span></button>
            <div class="tdrop-sep"></div>
            <button data-menu="close-tab">Close Tab <span>Ctrl+W</span></button>
            <button data-menu="reopen-tab">Reopen Tab <span>Ctrl+⇧+T</span></button>
            <div class="tdrop-sep"></div>
            <button data-menu="extension-id">Extension ID…</button>
            <div class="tdrop-sep"></div>
            <button data-menu="quit">Quit</button>
          </div>
        </div>

        <div class="titlebar-menu">
          <button class="titlebar-menu-btn">View</button>
          <div class="titlebar-dropdown hidden">
            <div class="tdrop-submenu">
              <button class="tdrop-submenu-item">UI Scaling <span>&#x276F;</span></button>
              <div class="tdrop-submenu-panel">
                <button data-menu="zoom-50">50%</button>
                <button data-menu="zoom-75">75%</button>
                <button data-menu="zoom-100">100%</button>
                <button data-menu="zoom-125">125%</button>
                <button data-menu="zoom-150">150%</button>
                <button data-menu="zoom-200">200%</button>
              </div>
            </div>
            <div class="tdrop-sep"></div>
            <button data-menu="fit-width">Fit Width</button>
            <button data-menu="fit-height">Fit Height</button>
            <div class="tdrop-sep"></div>
            <button data-menu="devtools">Developer Tools</button>
            <button data-menu="app-reload">Reload App</button>
          </div>
        </div>
      </div>

      <!-- Centred file path; truncates from the beginning when too long -->
      <div id="title-path-wrap">
        <span id="title-filename">Reamlet</span>
      </div>

      <!-- Custom window controls (frame: false — no native chrome) -->
      <div id="win-controls">
        <button id="btn-win-min"   title="Minimise">&#x2014;</button>
        <button id="btn-win-max"   title="Maximise / Restore">&#x2610;</button>
        <button id="btn-win-close" title="Close">&#x2715;</button>
      </div>

    </div>

    <!-- Row 2: annotation + navigation tools -->
    <div id="tools-row">

    <!-- LEFT: annotation tools, right-aligned toward center -->
    <div id="tools-left">
      <button id="tool-select" class="tool-btn active" title="Select / Move (Esc)" data-tool="select">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M5 3l14 9-7 1.5-3.5 6.5z"/>
        </svg>
      </button>

      <button id="tool-draw" class="tool-btn" title="Draw (D)" data-tool="draw">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </button>

      <button id="tool-highlight" class="tool-btn" title="Highlight (H)" data-tool="highlight">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3h6v13l-3 3-3-3V3z"/>
          <line x1="6" y1="21" x2="18" y2="21"/>
        </svg>
      </button>

      <button id="tool-text" class="tool-btn" title="Text box (T)" data-tool="text"
              style="font-weight:bold;font-size:17px;">T</button>

      <span class="sep"></span>

      <button id="tool-line" class="tool-btn" title="Line (L)" data-tool="line">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
        </svg>
      </button>

      <button id="tool-rect" class="tool-btn" title="Rectangle (R)" data-tool="rect">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="5" width="18" height="14"/>
        </svg>
      </button>

      <button id="tool-oval" class="tool-btn" title="Oval (O)" data-tool="oval">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <ellipse cx="12" cy="12" rx="10" ry="7"/>
        </svg>
      </button>

      <button id="tool-arrow" class="tool-btn" title="Arrow (A)" data-tool="arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
          <polyline points="9 5 19 5 19 15"/>
        </svg>
      </button>

      <span class="sep"></span>

      <button id="tool-eraser" class="tool-btn" title="Eraser — drag to erase (E)" data-tool="eraser">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 20H7L3 16l13-13 7 7-3 3z"/>
          <path d="M6.5 17.5l4-4"/>
        </svg>
      </button>

      <span class="sep"></span>

      <button id="tool-pan" class="tool-btn" title="Pan (P)" data-tool="pan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 11V8a2 2 0 0 0-4 0v1a2 2 0 0 0-4 0V7a2 2 0 0 0-4 0v6l-1.5-1.5a2 2 0 0 0-2.83 2.83L6 20h12v-3a4 4 0 0 0-4-4h4z"/>
        </svg>
      </button>
    </div>

    <!-- CENTER: page navigation -->
    <div id="tools-center">
      <button id="btn-prev-page" title="Previous page">&#x2039;</button>
      <input  id="page-input" type="number" min="1" value="1" title="Jump to page" />
      <span   id="page-total">/ 1</span>
      <button id="btn-next-page" title="Next page">&#x203A;</button>
    </div>

    <!-- RIGHT: view + text formatting + colour picker, left-aligned toward center -->
    <div id="tools-right">
      <button id="btn-undo" title="Undo (Ctrl+Z)">&#x21A9;</button>
      <button id="btn-redo" title="Redo (Ctrl+Y)">&#x21AA;</button>
      <span class="sep"></span>

      <button id="btn-fit"    title="Fit Width (Ctrl+0)">&#x21D4;</button>
      <button id="btn-fit-h"  title="Fit Height">&#x21D5;</button>
      <button id="btn-rotate" title="Rotate 90° CW — Shift+click for current page only">&#x21BB;</button>
      <button id="btn-print"  title="Print (Ctrl+P)">&#x2399;</button>
      <span class="sep"></span>

      <button id="btn-bold"      title="Bold text">B</button>
      <button id="btn-underline" title="Underline text">U</button>
      <input  id="font-size-input" type="number" min="8" max="96" value="14" title="Font size (pt)" />
      <span class="sep"></span>

      <!-- Colour picker: single dot button → opens swatch panel -->
      <div id="color-picker-wrap">
        <button id="color-btn" title="Colour">
          <span id="color-dot"></span>
        </button>
        <div id="color-panel" class="hidden">
          <!-- Row 1: Reds / warm -->
          <button class="swatch" data-color="#ff3333" style="background:#ff3333" title="Red"></button>
          <button class="swatch" data-color="#ff6644" style="background:#ff6644" title="Coral"></button>
          <button class="swatch" data-color="#ff8c00" style="background:#ff8c00" title="Orange"></button>
          <button class="swatch" data-color="#ffb300" style="background:#ffb300" title="Amber"></button>
          <button class="swatch" data-color="#f5c518" style="background:#f5c518" title="Yellow"></button>
          <!-- Row 2: Greens -->
          <button class="swatch" data-color="#aacc00" style="background:#aacc00" title="Lime"></button>
          <button class="swatch" data-color="#33bb55" style="background:#33bb55" title="Green"></button>
          <button class="swatch" data-color="#00cc88" style="background:#00cc88" title="Teal"></button>
          <button class="swatch" data-color="#00bbbb" style="background:#00bbbb" title="Cyan"></button>
          <button class="swatch" data-color="#0099cc" style="background:#0099cc" title="Sky"></button>
          <!-- Row 3: Blues / purples -->
          <button class="swatch" data-color="#3388ff" style="background:#3388ff" title="Blue"></button>
          <button class="swatch" data-color="#0055cc" style="background:#0055cc" title="Dark Blue"></button>
          <button class="swatch" data-color="#6644cc" style="background:#6644cc" title="Indigo"></button>
          <button class="swatch" data-color="#cc44ff" style="background:#cc44ff" title="Purple"></button>
          <button class="swatch" data-color="#ff44aa" style="background:#ff44aa" title="Pink"></button>
          <!-- Row 4: Neutrals -->
          <button class="swatch" data-color="#884400" style="background:#884400" title="Brown"></button>
          <button class="swatch" data-color="#111111" style="background:#111111" title="Black"></button>
          <button class="swatch" data-color="#555555" style="background:#555555" title="Dark Gray"></button>
          <button class="swatch" data-color="#aaaaaa" style="background:#aaaaaa" title="Gray"></button>
          <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
        </div>
      </div>

      <input id="thickness" type="range" min="1" max="20" value="3" title="Thickness" />
    </div>

    </div><!-- /#tools-row -->

  </div><!-- /#topbar -->

  <!-- ── Content area: sidebars overlay the viewer ─────────────── -->
  <div id="content-area">

    <!-- Viewer host fills the entire content area; pages always centred -->
    <div id="viewer-host">
      <div id="empty-state">
        <p>No file open.<br>Press <kbd>Ctrl+O</kbd> to open a PDF.</p>
      </div>
    </div>

    <!-- Horizontal scrollbar (shown only when content overflows horizontally) -->
    <div id="viewer-scrollbar-h">
      <div id="viewer-scrollbar-thumb-h"></div>
    </div>

    <!-- Left sidebar: permanent overlay -->
    <div id="sidebar">
      <div id="sidebar-header">
        <button class="sidebar-mode-btn active" data-mode="tabs" title="File Tabs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="8" height="8"/><rect x="14" y="3" width="8" height="8"/>
            <rect x="2" y="14" width="8" height="8"/><rect x="14" y="14" width="8" height="8"/>
          </svg>
        </button>
        <button class="sidebar-mode-btn" data-mode="tools" title="Tools">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </button>
        <div id="sidebar-spacer"></div>
      </div>

      <div id="tab-bar" class="sidebar-panel active"></div>

      <div id="tools-panel" class="sidebar-panel">
        <button id="btn-combine" class="tool-panel-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
          </svg>
          Combine PDFs
        </button>
        <button id="btn-reorder" class="tool-panel-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="2" y="2" width="8" height="10"/><rect x="14" y="2" width="8" height="10"/>
            <rect x="2" y="16" width="8" height="6"/><rect x="14" y="16" width="8" height="6"/>
          </svg>
          Reorder Pages
        </button>
      </div>

      <!-- Drag handle on right edge -->
      <div class="resize-handle" id="sidebar-resize"></div>
    </div>

    <!-- Custom scrollbar: UI layer, repositions around toc-panel -->
    <div id="viewer-scrollbar"><div id="viewer-scrollbar-thumb"></div></div>

    <!-- TOC sidebar: right overlay, visible when PDF has an outline -->
    <div id="toc-panel" class="hidden">
      <div id="toc-header">
        <!-- Resize handle on left edge -->
        <div class="resize-handle" id="toc-resize"></div>
        <span id="toc-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="9" y1="6"  x2="20" y2="6"/>
            <line x1="9" y1="12" x2="20" y2="12"/>
            <line x1="9" y1="18" x2="20" y2="18"/>
            <circle cx="4" cy="6"  r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span id="toc-title">Contents</span>
      </div>
      <div id="toc-tree"></div>
    </div>

    <!-- ── Find bar (Ctrl+F) ──────────────────────────────────── -->
    <div id="find-bar" class="hidden">
      <div id="find-bar-inner">
        <input id="find-input" type="text" placeholder="Find…" autocomplete="off" spellcheck="false" />
        <span id="find-counter"></span>
        <button id="find-prev" title="Previous (Shift+Enter)">&#x2303;</button>
        <button id="find-next" title="Next (Enter)">&#x2304;</button>
        <div class="find-toggle-group">
          <button class="find-toggle active" data-scope="current" title="Current document">Doc</button>
          <button class="find-toggle"        data-scope="all"     title="All open documents">All</button>
        </div>
        <div class="find-toggle-group">
          <button class="find-toggle" data-mode="wildcard" title="Wildcard: * = any chars, ? = one char">*?</button>
          <button class="find-toggle" data-mode="fuzzy"    title="Fuzzy: approximate match">~</button>
        </div>
        <button id="find-close" title="Close (Esc)">&#x2715;</button>
      </div>
      <div id="find-dropdown" class="hidden"></div>
    </div>

  </div>

  <!-- ── Combine modal ─────────────────────────────────────────── -->
  <div id="combine-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">Combine PDFs</div>
      <p class="modal-hint">Click documents to add them in order. Click again to remove.</p>
      <div class="modal-body">
        <div id="combine-list"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="combine-cancel">Cancel</button>
        <button class="modal-btn primary" id="combine-ok">Combine</button>
      </div>
    </div>
  </div>

  <!-- ── Reorder modal ─────────────────────────────────────────── -->
  <div id="reorder-modal" class="modal-overlay hidden">
    <div class="modal-box" style="min-width:560px;">
      <div class="modal-title">Reorder Pages</div>
      <p class="modal-hint">Drag page thumbnails to reorder them.</p>
      <div class="modal-body">
        <div id="reorder-pages"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="reorder-cancel">Cancel</button>
        <button class="modal-btn primary" id="reorder-ok">Apply</button>
      </div>
    </div>
  </div>

  <!-- ── Close confirm modal ───────────────────────────────────── -->
  <div id="close-modal" class="modal-overlay hidden">
    <div class="modal-box" style="min-width:340px;">
      <div class="modal-title">Unsaved Changes</div>
      <p class="modal-hint" id="close-modal-msg"></p>
      <div class="modal-footer">
        <button class="modal-btn" id="close-cancel">Cancel</button>
        <button class="modal-btn" id="close-discard">Discard All</button>
        <button class="modal-btn primary" id="close-save">Save All</button>
      </div>
    </div>
  </div>

 <!-- ── Extension ID modal ────────────────────────────────────── -->
  <div id="ext-id-modal" class="modal-overlay hidden">
    <div class="modal-box" style="min-width:420px;">
      <div class="modal-title">Extension ID</div>
      <p class="modal-hint">Paste the extension ID from <code>edge://extensions</code> or <code>chrome://extensions</code>.</p>
      <div class="modal-body" style="padding:0 0 8px;">
        <input id="ext-id-input" type="text" spellcheck="false" autocomplete="off"
               placeholder="e.g. abcdefghijklmnopabcdefghijklmnop"
               style="width:100%;box-sizing:border-box;padding:6px 8px;font-family:monospace;font-size:13px;background:#2a2a2a;color:#e0e0e0;border:1px solid #555;border-radius:4px;outline:none;" />
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="ext-id-cancel">Cancel</button>
        <button class="modal-btn primary" id="ext-id-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Context menu ──────────────────────────────────────────── -->
  <div id="context-menu" class="hidden">
    <button data-ctx="cut">Cut</button>
    <button data-ctx="paste">Paste</button>
    <div class="ctx-sep"></div>
    <button data-ctx="copy">Copy</button>
    <button data-ctx="highlight">Highlight</button>
    <button data-ctx="find">Find</button>
  </div>

  <!-- ── Input context menu ───────────────────────────────────── -->
  <div id="input-ctx-menu" class="hidden">
    <button data-input-ctx="cut">Cut</button>
    <button data-input-ctx="copy">Copy</button>
    <button data-input-ctx="paste">Paste</button>
  </div>

  <!-- ── Tab context menu ──────────────────────────────────────── -->
  <div id="tab-context-menu" class="hidden">
    <button data-tctx="close">Close</button>
    <button data-tctx="save">Save</button>
    <button data-tctx="save-as">Save As…</button>
    <button data-tctx="print">Print</button>
    <div class="ctx-sep"></div>
    <button data-tctx="copy-file">Copy</button>
    <button data-tctx="reveal">Open in Explorer</button>
    <div class="ctx-sep"></div>
    <button data-tctx="close-others">Close Other Tabs</button>
  </div>

  <script type="module" src="../out/renderer/app.js"></script>
</body>
</html>

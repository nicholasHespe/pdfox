# ───────────────────────────────────────────────────────────────
#  Reamlet Release — build all platforms and publish a GitHub
#  release whenever a v* tag is pushed to the repository.
#
#  Workflow:
#    git tag v0.x.y && git push origin v0.x.y
#
#  This produces:
#    • Windows NSIS installer + portable .exe
#    • Linux AppImage
#    • macOS universal DMG
# ───────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
#  Build jobs (run in parallel)
# ─────────────────────────────────────────────────────────────

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run build

      - name: Package Windows installer + portable
        run: pnpm exec electron-builder --win nsis portable --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/*.exe

  # ──────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run build

      - name: Package Linux AppImage
        run: pnpm exec electron-builder --linux AppImage --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*.AppImage

  # ──────────────────────────────
  build-mac:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/Library/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run build

      - name: Package macOS DMG
        # CSC_IDENTITY_AUTO_DISCOVERY=false skips code-signing so the
        # build succeeds without a Developer ID certificate in CI.
        run: pnpm exec electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: dist/*.dmg

  # ─────────────────────────────────────────────────────────────
  #  Create GitHub Release (runs after all builds succeed)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

# ───────────────────────────────────────────────────────────────
#  Reamlet Release — build all platforms and publish a GitHub
#  release whenever a v* tag is pushed to the repository.
#
#  Workflow:
#    git tag v0.x.y && git push origin v0.x.y
#
#  This produces:
#    • Windows NSIS installer + portable .exe
#    • Linux AppImage
# ───────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
#  Build jobs (run in parallel)
# ─────────────────────────────────────────────────────────────

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run build

      - name: Build native messaging host
        run: pnpm run build-native-host

      - name: Package Windows installer + portable
        run: pnpm exec electron-builder --win nsis portable --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/*.exe

  # ──────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run build

      - name: Package Linux AppImage
        run: pnpm exec electron-builder --linux AppImage --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*.AppImage

  # ─────────────────────────────────────────────────────────────
  #  Create GitHub Release (runs after all builds succeed)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: artifacts/**
          generate_release_notes: true
